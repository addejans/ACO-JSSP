name: Update Report With HiGHS Once

on:
  push:
    branches: [add-highs-milp-comparison]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-report:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends texlive-latex-base texlive-latex-recommended texlive-latex-extra texlive-fonts-recommended texlive-pictures
      - name: Update report source and compile PDF
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('paper/ACO_JSSP_Updated_Report.tex')
          text = p.read_text(encoding='utf-8')

          text = text.replace(
              'Python 3 solver, generated instances, browser-based Gantt visualizer, test suite, and GitHub Pages deployment.',
              'Python 3 solver, generated instances, browser-based Gantt visualizer, HiGHS MILP baseline, comparison runner, test suite, and GitHub Pages deployment.'
          )
          text = text.replace(
              'pair-swap local search to improve constructed schedules. The objective is practical clarity:',
              'pair-swap local search to improve constructed schedules, and compares heuristic schedules against exact MILP results on small instances. The objective is practical clarity:'
          )
          text = text.replace(
              '\\texttt{src/aco\\_jssp.py} & Modern Python 3 solver, generated instance creation, CLI, schedule decoder, local search, and JSON output. \\\\',
              '\\texttt{src/aco\\_jssp.py} & Modern Python 3 solver, generated instance creation, CLI, schedule decoder, local search, and JSON output. \\\\\n\\texttt{src/milp\\_jssp.py} & Exact disjunctive MILP baseline using SciPy and the HiGHS solver backend. \\\\\n\\texttt{src/compare\\_solvers.py} & Command-line comparison runner for ACO versus HiGHS MILP. \\\\'
          )
          text = text.replace(
              'Output & Makespan, number of operations, Gantt chart, job legend, schedule JSON. \\\\',
              'Output & ACO makespan, ACO runtime, exact makespan when available, optimality gap, solver status, Gantt chart, and schedule JSON. \\\\'
          )
          text = text.replace(
              '\\section{Browser Visualizer}',
              '''\\section{Exact MILP Baseline with HiGHS}

The updated repository also includes an exact mixed-integer linear programming baseline in \\texttt{src/milp\\_jssp.py}. This model is intended for comparison, not for replacing the ACO demonstration. The ACO solver gives a fast heuristic schedule. The MILP solver provides a benchmark objective value when the instance is small enough for exact solution.

The MILP uses continuous start-time variables, a makespan variable, and binary ordering variables for each pair of operations that share a machine. For two operations $a$ and $b$ on the same machine, the binary variable $y_{a,b}$ selects which operation comes first. With a horizon constant $H$, the disjunction is linearized as:

\\[
s_b - s_a - H y_{a,b} \\geq p_a - H,
\\]

\\[
s_a - s_b + H y_{a,b} \\geq p_b.
\\]

When $y_{a,b}=1$, operation $a$ is forced before operation $b$. When $y_{a,b}=0$, operation $b$ is forced before operation $a$. The objective minimizes $C_{\\max}$ subject to job precedence, machine non-overlap, and makespan constraints.

The HiGHS baseline can be run from the command line after installing the optional dependency:

\\begin{lstlisting}[language=bash]
python -m pip install -r requirements-optional.txt
python -m src.compare_solvers --jobs 4 --machines 3 --ants 40 --iterations 120 --milp-time-limit 10
\\end{lstlisting}

The comparison runner reports ACO makespan, ACO runtime, HiGHS objective, HiGHS runtime, solver status, MIP gap, and ACO gap versus the MILP objective when HiGHS proves optimality. This gives the project a clean distinction between heuristic performance and exact-solver proof.

\\section{Browser Visualizer}'''
          )
          text = text.replace(
              'The browser visualizer is a static HTML page under \\texttt{docs/index.html}. It runs directly on GitHub Pages without a backend. The UI exposes controls for both problem generation and algorithm behavior.',
              'The browser visualizer is a static HTML page under \\texttt{docs/index.html}. It runs directly on GitHub Pages without a backend. The UI exposes controls for both problem generation and algorithm behavior, and it includes an exact comparison panel for small instances. Because SciPy and HiGHS cannot run inside a static GitHub Pages browser session, the UI uses a capped branch-and-bound exact search for interactive comparison. The Python report and CLI use HiGHS for the MILP baseline.'
          )
          text = text.replace(
              '\\item the solver can handle larger generated instances as a smoke test.',
              '\\item the solver can handle larger generated instances as a smoke test;\n\\item the optional HiGHS MILP baseline can solve a small generated instance when SciPy is installed.'
          )
          text = text.replace(
              'This project is an educational and demonstrative implementation. It does not yet include standard benchmark comparisons, optimality gaps, parallel ants, advanced critical-path neighborhoods, disjunctive graph visualizations, or exact MILP baselines.',
              'This project is an educational and demonstrative implementation. It now includes a small-instance HiGHS MILP baseline, but it does not yet include broad benchmark calibration, large-instance optimality studies, parallel ants, advanced critical-path neighborhoods, or disjunctive graph visualizations.'
          )
          text = text.replace(
              '\\item Add a MILP or CP-SAT baseline for small cases.',
              '\\item Extend the HiGHS MILP baseline with benchmark reporting and richer solver diagnostics.\n\\item Add a CP-SAT baseline for comparison against the MILP formulation.'
          )
          p.write_text(text, encoding='utf-8')
          PY
          pdflatex -interaction=nonstopmode -halt-on-error -output-directory paper paper/ACO_JSSP_Updated_Report.tex
          pdflatex -interaction=nonstopmode -halt-on-error -output-directory paper paper/ACO_JSSP_Updated_Report.tex
          rm -f paper/*.aux paper/*.log paper/*.out paper/*.toc .github/workflows/update-report-highs-once.yml .github/update-report-highs-trigger
      - name: Commit report update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "Update report with HiGHS MILP comparison"
          git push
